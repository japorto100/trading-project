# Run from go-backend: golangci-lint run ./cmd/... ./internal/...
# golangci-lint v2.9+ config
version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - exhaustive
    - revive
    - nolintlint
  settings:
    staticcheck:
      checks:
        - "all"
        - "-SA1019"   # grpc.DialContext deprecation -- migration tracked separately
        - "-ST1000"   # package comments -- not enforced yet
        - "-ST1003"   # naming conventions -- existing code uses JsonRPC prefix
    revive:
      rules:
        - name: exported
          disabled: true   # export comments not enforced yet
        - name: var-naming
          disabled: true   # existing code uses JsonRPC prefix
    exhaustive:
      default-signifies-exhaustive: true
    nolintlint:
      require-explanation: true
      require-specific: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
    paths:
      - vendor-forks
