root = "."
test_data_dir = "testdata"
tmp_dir = "tmp"

[build]
  bin = "./tmp/main.exe"
  cmd = "go build -o ./tmp/main.exe ./cmd/gateway"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "vendor-forks"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  # Env vars (OTEL_ENABLED etc.) are loaded by dev-stack.ps1 before Air starts and inherited
  # by all child processes. Do NOT set full_bin to a PS wrapper — cmd /C quoting breaks on Windows.
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
