# sqlc configuration stub — inactive until Phase 20 Go DB migration.
# Activate by running: sqlc generate (after installing sqlc CLI)
version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries"
    schema: "internal/db/migrations"
    gen:
      go:
        package: "repository"
        out: "internal/repository"
        emit_json_tags: true
        emit_interface: true
