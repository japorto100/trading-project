name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Biome lint
        run: bun run lint

  build-go:
    name: Build Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go-backend/go.mod
          cache: true
          cache-dependency-path: go-backend/go.sum
      - name: Build
        working-directory: go-backend
        run: go build ./...

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go-backend/go.mod
          cache: true
          cache-dependency-path: go-backend/go.sum
      - name: Unit tests
        working-directory: go-backend
        run: go test ./...

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: latest
      - name: Ruff check
        working-directory: python-backend
        run: uv run ruff check .
