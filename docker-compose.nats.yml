# NATS JetStream — standalone compose for local dev without full stack.
# For dev-stack.ps1 integration use: .\scripts\dev-stack.ps1 -Nats
# For isolated NATS only:  docker compose -f docker-compose.nats.yml up -d
# Monitor:                 nats-server --mon → http://localhost:8222
version: "3.9"
services:
  nats:
    image: nats:2.10-alpine
    container_name: tradeview-nats
    command:
      - "-js"                        # enable JetStream
      - "-m=8222"                    # monitoring HTTP endpoint
      - "--max_payload=8MB"          # allow larger candle payloads
    ports:
      - "4222:4222"                  # client connections
      - "8222:8222"                  # monitoring UI → http://localhost:8222
    volumes:
      - nats_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  nats_data:
